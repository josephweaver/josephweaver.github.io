title: Joseph Weaver Public Notebook
description: Research notes on probability, geospatial systems, Bayesian modeling, AI-assisted workflows, and systems design.
author: Joseph M. Weaver
url: "https://josephweaver.github.io"
repository: josephweaver/josephweaver.github.io
timezone: America/New_York

remote_theme: pages-themes/cayman@v0.2.0   # or: slate, minimal, hacker, leap-day
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# Optional analytics for the static GitHub Pages site.
# GitHub Pages cannot maintain a server-side hit counter by itself, so this
# layout hook sends page views to an external counter when configured.
#
# analytics:
#   goatcounter:
#     domain: josephweaver.goatcounter.com

markdown: kramdown
kramdown:
  input: GFM
  math_engine: mathjax

exclude:
  - private/
  - vendor/
  - .bundle/
  - Gemfile.lock

defaults:
  - scope:
      path: "probability"
    values:
      layout: default
      math: true
  - scope:
      path: "research"
    values:
      layout: default
  - scope:
      path: "fiction"
    values:
      layout: default

giscus:
  repo: josephweaver/josephweaver.github.io
  repo_id: R_kgDOJRcmlg
  category: Page Discussions
  category_id: DIC_kwDOJRcmls4C0O8F
  mapping: pathname
  reactions_enabled: 1
  emit_metadata: 0
  input_position: bottom
  theme: light
  lang: en
  loading: lazy
